apiVersion: apps/v1
kind: Deployment
metadata:
  name: allegro-api-gateway
  namespace: statex-apps
  labels:
    app: allegro-api-gateway
    managed-by: k8s-migration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: allegro-api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: allegro-api-gateway
    spec:
      containers:
        - name: app
          image: localhost:5000/allegro-api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3411
          env:
            - name: NODE_ENV
              value: "production"
            - name: API_GATEWAY_PORT
              value: "3411"
            - name: ALLEGRO_SERVICE_URL
              value: "http://allegro-service:3000"
            - name: AUTH_SERVICE_URL
              value: "http://auth-microservice:3370"
            - name: IMPORT_SERVICE_URL
              value: "http://allegro-imports:3406"
            - name: SETTINGS_SERVICE_URL
              value: "http://allegro-settings:3408"
            - name: CORS_ORIGIN
              value: "https://allegro.alfares.cz"
            - name: LOGGING_SERVICE_URL
              value: "http://logging-microservice:3367"
            - name: ALLEGRO_FRONTEND_SERVICE_PORT
              value: "3410"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: allegro-secret
                  key: JWT_SECRET
          startupProbe:
            httpGet:
              path: /api/health
              port: 3411
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3411
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3411
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
