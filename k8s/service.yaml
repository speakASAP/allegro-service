apiVersion: v1
kind: Service
metadata:
  name: allegro-service
  namespace: statex-apps
  labels:
    app: allegro-service
    managed-by: k8s-migration
spec:
  type: ClusterIP
  selector:
    app: allegro-service
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      name: http
