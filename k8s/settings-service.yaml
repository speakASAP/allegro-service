apiVersion: v1
kind: Service
metadata:
  name: allegro-settings
  namespace: statex-apps
  labels:
    app: allegro-settings
    managed-by: k8s-migration
spec:
  type: ClusterIP
  selector:
    app: allegro-settings
  ports:
    - protocol: TCP
      port: 3408
      targetPort: 3408
      name: app
