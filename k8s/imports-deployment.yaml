apiVersion: apps/v1
kind: Deployment
metadata:
  name: allegro-imports
  namespace: statex-apps
  labels:
    app: allegro-imports
    managed-by: k8s-migration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: allegro-imports
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: allegro-imports
    spec:
      containers:
        - name: app
          image: localhost:5000/allegro-imports:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3406
          envFrom:
            - configMapRef:
                name: allegro-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: DB_PASSWORD
            - name: DATABASE_URL_OVERRIDE
              valueFrom:
                secretKeyRef:
                  name: allegro-database-url-secret
                  key: DATABASE_URL_OVERRIDE
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-microservice-secret
                  key: JWT_SECRET
          startupProbe:
            httpGet:
              path: /health
              port: 3406
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3406
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3406
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
