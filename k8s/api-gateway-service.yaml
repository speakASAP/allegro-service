apiVersion: v1
kind: Service
metadata:
  name: allegro-api-gateway
  namespace: statex-apps
  labels:
    app: allegro-api-gateway
    managed-by: k8s-migration
spec:
  type: ClusterIP
  selector:
    app: allegro-api-gateway
  ports:
    - protocol: TCP
      port: 3411
      targetPort: 3411
      name: app
