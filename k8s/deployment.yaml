apiVersion: apps/v1
kind: Deployment
metadata:
  name: allegro-service
  namespace: statex-apps
  labels:
    app: allegro-service
    managed-by: k8s-migration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: allegro-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: allegro-service
    spec:
      containers:
        - name: app
          image: localhost:5000/allegro-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: allegro-service-config
            - secretRef:
                name: allegro-service-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
