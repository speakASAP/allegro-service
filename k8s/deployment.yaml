apiVersion: apps/v1
kind: Deployment
metadata:
  name: allegro-service
  namespace: statex-apps
  labels:
    app: allegro-service
    managed-by: k8s-migration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: allegro-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: allegro-service
    spec:
      containers:
        - name: app
          image: localhost:5000/allegro-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3403
          envFrom:
            - configMapRef:
                name: allegro-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: DB_PASSWORD
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: allegro-secret
                  key: ENCRYPTION_KEY
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-microservice-secret
                  key: JWT_SECRET
            - name: JWT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: allegro-service-secret
                  key: JWT_TOKEN
            - name: CATALOG_INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: allegro-service-secret
                  key: CATALOG_INTERNAL_SERVICE_TOKEN
            - name: ALLEGRO_INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: orders-microservice-secret
                  key: ALLEGRO_INTERNAL_SERVICE_TOKEN
            - name: ALLEGRO_ORDER_FORWARDING_WAREHOUSE_ID
              value: "c0de0000-0000-4000-8000-000000000013"
          startupProbe:
            httpGet:
              path: /health
              port: 3403
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3403
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3403
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
